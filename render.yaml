# Blueprint: https://dashboard.render.com/blueprints
# One-click: https://render.com/deploy?repo=https://github.com/SumithShet18/clearance
#
# Docker deploy is the most reliable path for this monorepo (samples + evals + API).

services:
  - type: web
    name: clearance
    runtime: docker
    plan: free
    dockerfilePath: ./Dockerfile
    dockerContext: .
    region: oregon
    healthCheckPath: /api/health
    envVars:
      - key: CLEARANCE_MODE
        value: mock
      - key: PORT
        value: "8000"
